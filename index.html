<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud & Business</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333; --cp-color: #aaa; --input-bg: #000; --input-border: #444;
            --btn-bg: #222; --job-bg: #1a1a1a;
        }

        .light-theme {
            --bg: #f4f5f7; --card: #ffffff; --text: #111111;
            --primary: #0066cc; --accent: #e6b800; --danger: #cc0000; --success: #009944;
            --border: #cccccc; --cp-color: #777777; --input-bg: #ffffff; --input-border: #bbbbbb;
            --btn-bg: #eeeeee; --job-bg: #fdfdfd;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 10px; margin: 0; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
        
        #user_display { font-size: 0.8em; color: var(--success); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; min-height: 1.2em; }
        
        /* OPRAVA: Počítadlo užívateľov nebude blokovať dotyky */
        #total_users_display { 
            position: fixed; bottom: 5px; left: 10px; font-size: 0.7em; color: #888; font-weight: bold; 
            z-index: 50; background: var(--bg); padding: 2px 5px; border-radius: 4px; 
            pointer-events: none; opacity: 0.8; 
        }

        .header { width: 100%; max-width: 1200px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 12px; margin: 0 auto 15px auto; gap: 10px; }
        .header-center { flex-grow: 1; text-align: center; }
        #live-clock { font-size: 1.8em; font-weight: 900; color: var(--text); margin-bottom: 2px; }
        #live-date { font-size: 0.85em; color: var(--primary); text-transform: uppercase; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .config-bar { background: var(--job-bg); padding: 10px; border-radius: 10px; display: flex; gap: 10px; border: 1px solid var(--primary); align-items: flex-end; flex-wrap: wrap;}
        .config-input { background: var(--input-bg); border: 1px solid var(--primary); color: var(--primary); font-weight: bold; text-align: center; border-radius: 4px; padding: 5px; width: 65px; }
        .btn-toggle { background: var(--btn-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; font-weight: bold; cursor: pointer; transition: 0.2s; height: 30px; display: flex; align-items: center; justify-content: center;}
        
        .lang-switcher, .curr-switcher { display: flex; gap: 5px; margin-right: 10px; align-items: center; }
        .lang-btn, .curr-btn { background: transparent; border: none; color: #666; cursor: pointer; font-weight: bold; font-size: 0.8em; padding: 2px 5px; transition: 0.3s; }
        .lang-btn.active, .curr-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .btn-info { background: transparent; color: var(--primary); border: 1px solid var(--primary); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; cursor: pointer; font-weight: bold; margin-left: 5px;}

        .main-layout { width: 100%; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; padding-bottom: 60px; }
        
        /* STICKY LEN PRE DESKTOP - Na mobile by to prekrývalo zoznam */
        @media (min-width: 768px) { 
            .main-layout { grid-template-columns: 340px 1fr; } 
            .sticky { position: sticky; top: 15px; z-index: 10; }
        }

        .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); transition: all 0.3s; }

        label { display: block; font-size: 0.65em; color: #888; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 8px; outline: none; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .status-toggle { display: flex; background: var(--input-bg); border-radius: 8px; border: 1px solid var(--input-border); margin-bottom: 15px; overflow: hidden; }
        .st-btn { flex: 1; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; font-size: 0.8em; color: #777; }
        .st-btn.active { color: #fff; }
        .light-theme .st-btn.active { color: #000; }
        .st-btn-cp.active { background: var(--cp-color); }
        .st-btn-ok.active { background: var(--success); color: #000; }

        .calc-preview { background: rgba(255, 204, 0, 0.05); padding: 12px; border-radius: 10px; margin: 10px 0; border: 1px solid var(--accent); color: var(--accent); }
        .line { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; }
        .input-inline { background: rgba(255, 204, 0, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 4px 8px; border-radius: 4px; width: 85px; text-align: right; font-weight: bold; }

        .btn-add { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn-buy { background: transparent; color: var(--success); border: 1px solid var(--success); padding: 8px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }

        .cloud-zone { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .cloud-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-cloud { width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8em; }
        .btn-backup { background: #0044cc; color: white; }
        .btn-restore { background: var(--btn-bg); color: var(--text); border: 1px solid var(--border); }
        .btn-register { background: var(--success); color: #000; }

        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 900px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .stat-card { background: var(--job-bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.6em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.1em; font-weight: 900; }
        .card-spent { color: var(--danger); border-bottom: 2px solid var(--danger); }
        .card-profit { border: 2px solid var(--success); color: var(--success); }

        .search-input { width: 100%; background: var(--job-bg); border: 2px solid var(--primary); color: var(--text); padding: 12px; border-radius: 10px; font-weight: bold; box-sizing: border-box; margin-bottom: 15px; }

        .job-card { background: #111; border: 1px solid #333; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; overflow: hidden; position: relative; transition: 0.2s; }
        .job-card.is-editing { border: 2px solid var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1.5s infinite; }
        .job-card.is-cp { border-left: 5px solid var(--cp-color); opacity: 0.85; }
        .job-card.is-ok { border-left: 5px solid var(--success); }
        .job-card.type-buy { border-left: 5px solid var(--danger); background: rgba(255, 62, 62, 0.05); }

        .sort-controls { display: flex; flex-direction: column; background: #222; border-right: 1px solid #333; align-self: stretch; justify-content: center; }
        .sort-btn { padding: 10px; color: #666; cursor: pointer; font-size: 1.2em; text-align: center; }
        .sort-btn:hover { color: var(--primary); }

        .job-info { flex-grow: 1; padding: 12px; }
        .job-name { font-weight: 900; font-size: 1.05em; margin-bottom: 2px; }
        .job-date { font-size: 0.65em; color: #666; font-weight: bold; }

        .job-data { display: flex; gap: 15px; margin-top: 8px; font-size: 0.8em; color: #aaa; }
        .job-data strong { color: var(--text); }

        .job-profit { border-left: 1px solid #222; padding: 12px; text-align: right; min-width: 80px; }
        .profit-val { font-size: 1.1em; font-weight: 900; color: var(--success); }
        .cost-val { font-size: 0.7em; color: var(--danger); opacity: 0.7; }

        .actions { padding: 10px; display: flex; gap: 5px; }
        .action-btn { background: var(--btn-bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .action-btn:hover { border-color: var(--primary); }
        .is-active-edit { background: var(--accent); color: #000; border-color: #000; }

        .is-cp-status { background: var(--cp-color); color: #000; font-weight: 800; border: none; }
        .is-ok-status { background: var(--success); color: #000; font-weight: 800; border: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .modal-content { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 2px solid var(--primary); padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; z-index: 1000; display: none; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--accent); }
            50% { box-shadow: 0 0 12px var(--accent); }
            100% { box-shadow: 0 0 5px var(--accent); }
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: stretch; }
            #live-clock { font-size: 1.5em; }
            .config-bar { justify-content: center; }
            
            .job-card { flex-wrap: wrap; padding-bottom: 0; }
            .sort-controls { padding: 5px; order: 1; border-right: none; border-bottom: 1px solid #222; width: 100%; flex-direction: row; justify-content: center; height: 35px; }
            .job-info { order: 2; flex: 1 1 60%; padding: 8px; }
            .job-profit { order: 3; flex: 1 1 30%; border-left: none; padding: 8px; border-bottom: 1px solid #222; }
            .job-data { order: 4; flex: 1 1 100%; justify-content: space-around; background: rgba(0,0,0,0.2); border-bottom: 1px solid #222; padding: 8px; font-size: 0.75em; }
            .actions { order: 5; flex: 1 1 100%; justify-content: center; padding: 12px; gap: 8px; }
            .action-btn { flex: 1; height: 40px; } /* Väčšie tlačidlá pre palec */
        }
    </style>
</head>
<body>

    <div id="total_users_display"></div>

    <div class="header">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('sk')">SK</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('cz')">CZ</button>
            <button class="btn-info" onclick="openInfo()">i</button>
        </div>

        <div class="header-center">
            <div id="live-clock">00:00:00</div>
            <div id="live-date"><span>📅</span> pondelok, 1. január</div>
        </div>

        <div class="config-bar">
            <div class="curr-switcher">
                <button class="curr-btn active" onclick="setCurrency('EUR')">€</button>
                <button class="curr-btn" onclick="setCurrency('USD')">$</button>
                <button class="curr-btn" onclick="setCurrency('CZK')">Kč</button>
            </div>
            <div><label id="cfg_lbl_fil">EUR/KG</label><input type="number" id="cfg_fil" class="config-input" value="20" step="any"></div>
            <div><label id="cfg_lbl_ele">EUR/KWH</label><input type="number" id="cfg_ele" class="config-input" value="0.20" step="any"></div>
            <div><label id="cfg_lbl_watt">WATT</label><input type="number" id="cfg_watt" class="config-input" value="100"></div>
            <button class="btn-toggle" id="btn_theme" onclick="toggleTheme()">🌙</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="panel sticky">
            <div id="user_display"></div>
            
            <div class="cloud-zone">
                <div class="cloud-row">
                    <button class="btn-cloud btn-backup" id="btn_back" onclick="backupToCloud()">☁️ ZÁLOHOVAŤ</button>
                    <button class="btn-cloud btn-restore" id="btn_rest" onclick="restoreFromCloud()">⬇️ OBNOVIŤ</button>
                </div>
                <button class="btn-cloud btn-register" id="btn_reg" onclick="registerUser()">👤 VYTVORIŤ UŽÍVATEĽA</button>
            </div>

            <div class="status-toggle">
                <div class="st-btn st-btn-cp active" id="st_cp" onclick="setStatus('cp')">CP</div>
                <div class="st-btn st-btn-ok" id="st_ok" onclick="setStatus('ok')">OK</div>
            </div>

            <label id="lbl_name">Názov zákazky</label>
            <input type="text" id="in_name" placeholder="...">

            <div class="row">
                <div><label id="lbl_w">Gramy (g)</label><input type="number" id="in_w"></div>
                <div><label id="lbl_count">Kusy</label><input type="number" id="in_count" value="1"></div>
            </div>
            <div class="row">
                <div><label id="lbl_h">Hodiny</label><input type="number" id="in_h"></div>
                <div><label id="lbl_m">Minúty</label><input type="number" id="in_m"></div>
            </div>

            <label id="lbl_price">Predajná cena / 1 ks</label>
            <input type="number" id="in_price_per" step="any">

            <div class="calc-preview">
                <div class="line"><span id="lbl_mat_tot">MATERIÁL SPOLU:</span> <span id="view_total_w">0 g</span></div>
                <div class="line">
                    <span id="lbl_cost_tot">NÁKLAD:</span>
                    <input type="number" id="view_total_cost" class="input-inline" step="any" value="0.00" oninput="updatePreview(false)">
                </div>
                <div class="line" style="border-top: 1px solid var(--border); padding-top: 5px; margin-top: 5px;">
                    <span id="lbl_profit_tot">ČISTÝ ZISK:</span> <span id="view_total_profit">0.00 €</span>
                </div>
            </div>

            <button class="btn-add" id="btn_save" onclick="addItem()">ULOŽIŤ DO HISTÓRIE</button>
            <button class="btn-buy" id="btn_other" onclick="addOtherItem()">✚ NÁKUP / INÉ VÝDAJE</button>
        </div>

        <div class="panel">
            <div class="summary-grid">
                <div class="stat-card"><div class="stat-label" id="stat_lbl_ord">Zakázky</div><div class="stat-value" id="stat_count">0</div></div>
                <div class="stat-card"><div class="stat-label" id="stat_lbl_rev">Obrat</div><div class="stat-value" id="stat_obrat">0 €</div></div>
                <div class="stat-card"><div class="stat-label" id="stat_lbl_profit">Čistý Zisk</div><div class="stat-value card-profit" id="stat_profit">0 €</div></div>
                <div class="stat-card"><div class="stat-label" id="stat_lbl_time">Čas Tisku</div><div class="stat-value" id="total_time_ever">0h 0m</div></div>
                <div class="stat-card"><div class="stat-label">Spotreba</div><div class="stat-value" id="total_kg_ever">0 kg</div></div>
                <div class="stat-card"><div class="stat-label" id="stat_lbl_mat">Materiál</div><div class="stat-value card-spent" id="total_mat_cost">0 €</div></div>
                <div class="stat-card"><div class="stat-label" id="stat_lbl_ele">Elektrina</div><div class="stat-value card-spent" id="total_ele_cost">0 €</div></div>
                <div class="stat-card"><div class="stat-label" id="stat_lbl_other">Jiné Extra</div><div class="stat-value card-spent" id="total_spent_other">0 €</div></div>
            </div>

            <input type="text" id="search_input" class="search-input" placeholder="🔍 Vyhľadať v histórii..." oninput="refreshUI()">
            
            <div id="history_list"></div>
        </div>
    </div>

    <div class="modal-overlay" id="info_overlay" onclick="closeInfo()"></div>
    <div class="modal-content" id="info_modal">
        <div class="modal-header">
            <h2 id="info_title" style="margin:0;">ℹ️ INFO</h2>
            <button class="btn-toggle" onclick="closeInfo()">✕</button>
        </div>
        <div id="info_text_content" style="font-size: 0.9em; line-height: 1.4;"></div>
        <button class="btn-add" id="btn_modal_close" onclick="closeInfo()" style="margin-top:20px;">Zavrieť</button>
    </div>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbz_63V51V803r_H100GZ100Y-100Y-100Y-100Y-100Y-100Y/exec"; // Ponechajte vašu URL
        let items = JSON.parse(localStorage.getItem('3dee_items')) || [];
        let currentLang = 'sk';
        let currentCurr = 'EUR';
        let currentStatus = 'cp';
        let editingId = null;
        let loggedUserNick = localStorage.getItem('3dee_nick') || "";
        let totalUsersCount = 0;

        const dict = {
            sk: {
                name: "Názov zákazky", w: "Gramy (g)", count: "Kusy", h: "Hodiny", m: "Minúty", price: "Predajná cena / 1 ks", per_pc: "na 1ks",
                m_tot: "MATERIÁL SPOLU:", c_tot: "NÁKLAD:", p_tot: "ČISTÝ ZISK:", save: "ULOŽIŤ DO HISTÓRIE", save_edit: "ULOŽIŤ ZMENY", cancel: "✖ ZRUŠIŤ ÚPRAVU",
                other: "✚ NÁKUP / INÉ VÝDAJE", b_back: "☁️ ZÁLOHOVAŤ", b_rest: "⬇️ OBNOVIŤ", b_reg: "👤 VYTVORIŤ UŽÍVATEĽA",
                s_ok: "Vytlačené (OK)", s_time: "Čas Tlače", s_ord: "Zákazky", s_rev: "Obrat", s_mat: "Materiál", s_ele: "Elektrina", s_oth: "Iné Extra", s_prof: "Čistý Zisk",
                search: "🔍 Vyhľadať v histórii...", cost: "Náklad", sell: "Predaj",
                p_nick: "Zadaj NICK (Prezývku):", p_pass: "Zadaj HESLO:", m_users: "Celkový počet užívateľov: ",
                info_title: "ℹ️ INFO", close: "Zavrieť",
                info_text: `
                    <p style="margin-bottom:8px;">Hobby nástroj na prepočítavanie 3D tlače a ukladanie zákaziek.</p>
                    <p style="margin-bottom:8px;">Pre dlhodobé ukladanie zákaziek je potrebné si vytvoriť Nick a Heslo.</p>
                    <p style="margin-bottom:8px;">Keď máte vytvorené svoje konto, následne sa prihlasujete len cez vaše heslo tlačidlom <b>OBNOVIŤ</b>.</p>
                    <p style="margin-bottom:8px;">Keď máte nahodené svoje položky, treba stlačiť <b>ZÁLOHOVAŤ</b>, aby sa zapísali do cloudu.</p>
                `
            },
            en: {
                name: "Job Name", w: "Grams (g)", count: "Pieces", h: "Hours", m: "Minutes", price: "Sell Price / 1 pc", per_pc: "per pc",
                m_tot: "TOTAL MATERIAL:", c_tot: "COST:", p_tot: "NET PROFIT:", save: "SAVE TO HISTORY", save_edit: "SAVE CHANGES", cancel: "✖ CANCEL EDIT",
                other: "✚ PURCHASE / OTHER", b_back: "☁️ BACKUP", b_rest: "⬇️ RESTORE", b_reg: "👤 REGISTER USER",
                s_ok: "Printed (OK)", s_time: "Print Time", s_ord: "Orders", s_rev: "Revenue", s_mat: "Material", s_ele: "Electricity", s_oth: "Other Extra", s_prof: "Net Profit",
                search: "🔍 Search history...", cost: "Cost", sell: "Sell",
                p_nick: "Enter NICK:", p_pass: "Enter PASSWORD:", m_users: "Total users: ",
                info_title: "ℹ️ INFO", close: "Close",
                info_text: `<p>Tool for 3D printing cost calculation and job history.</p>`
            },
            cz: {
                name: "Název zakázky", w: "Gramy (g)", count: "Kusy", h: "Hodiny", m: "Minuty", price: "Prodejní cena / 1 ks", per_pc: "na 1ks",
                m_tot: "MATERIÁL SPOLU:", c_tot: "NÁKLAD:", p_tot: "ČISTÝ ZISK:", save: "ULOŽIT DO HISTORIE", save_edit: "ULOŽIT ZMĚNY", cancel: "✖ ZRUŠIT ÚPRAVU",
                other: "✚ NÁKUP / JINÉ VÝDAJE", b_back: "☁️ ZÁLOHOVAT", b_rest: "⬇️ OBNOVIT", b_reg: "👤 VYTVOŘIT UŽIVATELE",
                s_ok: "Vytištěno (OK)", s_time: "Čas Tisku", s_ord: "Zakázky", s_rev: "Obrat", s_mat: "Materiál", s_ele: "Elektřina", s_oth: "Jiné Extra", s_prof: "Čistý Zisk",
                search: "🔍 Vyhledat v historii...", cost: "Náklad", sell: "Prodej",
                p_nick: "Zadej NICK:", p_pass: "Zadej HESLO:", m_users: "Celkový počet uživatelů: ",
                info_title: "ℹ️ INFO", close: "Zavřít",
                info_text: `<p>Hobby nástroj pro výpočet 3D tisku a historii zakázek.</p>`
            }
        };

        function setLang(l) {
            currentLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
            applyTexts();
        }

        function setCurrency(c, skipUI = false) {
            currentCurr = c;
            document.querySelectorAll('.curr-btn').forEach(b => {
                const sym = c==='EUR'?'€':(c==='USD'?'$':'Kč');
                b.classList.toggle('active', b.innerText === sym);
            });
            if(!skipUI) { updatePreview(); refreshUI(); applyTexts(); }
        }

        function applyTexts() {
            const t = dict[currentLang];
            const sym = currentCurr==='EUR'?'€':(currentCurr==='USD'?'$':'Kč');
            const ids = {
                'lbl_name': t.name, 'lbl_w': t.w, 'lbl_count': t.count, 'lbl_h': t.h, 'lbl_m': t.m, 'lbl_price': t.price,
                'lbl_mat_tot': t.m_tot, 'lbl_cost_tot': t.c_tot, 'lbl_profit_tot': t.p_tot,
                'btn_save': editingId ? t.save_edit : t.save,
                'btn_other': t.other, 'btn_back': t.b_back, 'btn_rest': t.b_rest, 'btn_reg': t.b_reg,
                'stat_lbl_ok': t.s_ok, 'stat_lbl_time': t.s_time, 'stat_lbl_ord': t.s_ord, 'stat_lbl_rev': t.s_rev,
                'stat_lbl_mat': t.s_mat, 'stat_lbl_ele': t.s_ele, 'stat_lbl_other': t.s_oth, 'stat_lbl_profit': t.s_prof,
                'info_title': t.info_title, 'btn_modal_close': t.close,
                'cfg_lbl_fil': `${sym}/KG`, 'cfg_lbl_ele': `${sym}/KWH`, 'cfg_lbl_watt': 'WATT'
            };
            for (let id in ids) if(document.getElementById(id)) document.getElementById(id).innerText = ids[id];
            document.getElementById('info_text_content').innerHTML = t.info_text;
            document.getElementById('search_input').placeholder = t.search;
            updateUserDisplay();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            document.getElementById('btn_theme').innerText = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
        }

        function updatePreview(updateCostInput = true) {
            const w = parseFloat(document.getElementById('in_w').value) || 0;
            const count = parseFloat(document.getElementById('in_count').value) || 1;
            const h = parseFloat(document.getElementById('in_h').value) || 0;
            const m = parseFloat(document.getElementById('in_m').value) || 0;
            const pricePer = parseFloat(document.getElementById('in_price_per').value) || 0;
            
            const cfgFil = parseFloat(document.getElementById('cfg_fil').value) || 0;
            const cfgEle = parseFloat(document.getElementById('cfg_ele').value) || 0;
            const cfgWatt = parseFloat(document.getElementById('cfg_watt').value) || 0;

            const totalW = w * count;
            const totalMin = (h * 60) + m;
            const matCost = (totalW / 1000) * cfgFil;
            const eleCost = (totalMin / 60) * (cfgWatt / 1000) * cfgEle;
            const totalCost = matCost + eleCost;
            const totalSell = pricePer * count;

            document.getElementById('view_total_w').innerText = totalW + " g";
            if(updateCostInput) document.getElementById('view_total_cost').value = totalCost.toFixed(2);
            
            const manualCost = parseFloat(document.getElementById('view_total_cost').value) || 0;
            const profit = totalSell - manualCost;
            
            const sym = currentCurr==='EUR'?'€':(currentCurr==='USD'?'$':'Kč');
            document.getElementById('view_total_profit').innerText = profit.toFixed(2) + " " + sym;
            document.getElementById('view_total_profit').style.color = profit >= 0 ? 'var(--success)' : 'var(--danger)';
        }

        function addItem() {
            const name = document.getElementById('in_name').value || "...";
            const w = parseFloat(document.getElementById('in_w').value) || 0;
            const count = parseFloat(document.getElementById('in_count').value) || 1;
            const h = parseFloat(document.getElementById('in_h').value) || 0;
            const m = parseFloat(document.getElementById('in_m').value) || 0;
            const sell = (parseFloat(document.getElementById('in_price_per').value) || 0) * count;
            const cost = parseFloat(document.getElementById('view_total_cost').value) || 0;

            const cfgFil = parseFloat(document.getElementById('cfg_fil').value) || 0;
            const cfgEle = parseFloat(document.getElementById('cfg_ele').value) || 0;
            const cfgWatt = parseFloat(document.getElementById('cfg_watt').value) || 0;

            const matCost = ((w * count) / 1000) * cfgFil;
            const eleCost = (((h * 60) + m) / 60) * (cfgWatt / 1000) * cfgEle;

            if(editingId) {
                items = items.map(i => i.id === editingId ? { ...i, name, w, count, h, m, sell, cost, status: currentStatus, matCost, eleCost, curr: currentCurr } : i);
                editingId = null;
            } else {
                items.unshift({ id: Date.now(), type: 'print', name, w, count, h, m, sell, cost, status: currentStatus, matCost, eleCost, curr: currentCurr, date: new Date().toLocaleString() });
            }
            resetForm();
            refreshUI();
        }

        function resetForm() {
            document.getElementById('in_name').value = "";
            document.getElementById('in_w').value = "";
            document.getElementById('in_h').value = "";
            document.getElementById('in_m').value = "";
            document.getElementById('in_price_per').value = "";
            document.getElementById('in_count').value = "1";
            editingId = null;
            applyTexts();
            updatePreview();
        }

        function editItem(id) {
            const i = items.find(x => x.id === id);
            if(!i) return;
            editingId = i.id;
            document.getElementById('in_name').value = i.name;
            document.getElementById('in_w').value = i.w || 0;
            document.getElementById('in_count').value = i.count || 1;
            document.getElementById('in_h').value = i.h || 0;
            document.getElementById('in_m').value = i.m || 0;
            document.getElementById('in_price_per').value = (i.sell / (i.count || 1)).toFixed(2);
            setStatus(i.status);
            applyTexts();
            updatePreview();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteItem(id) {
            if(confirm("Zmazať?")) { items = items.filter(i => i.id !== id); refreshUI(); }
        }

        function duplicateItem(id) {
            const i = items.find(x => x.id === id);
            items.unshift({...i, id: Date.now(), date: new Date().toLocaleString()});
            refreshUI();
        }

        function toggleItemStatus(id) {
            items = items.map(i => i.id === id ? {...i, status: i.status === 'ok' ? 'cp' : 'ok'} : i);
            refreshUI();
        }

        function addOtherItem() {
            const n = prompt("Názov:"); if(!n) return;
            const valStr = prompt("Suma (+ predaj, - výdavok):"); if(!valStr) return;
            const v = parseFloat(valStr.replace(',','.')); if(isNaN(v)) return;
            items.unshift({id:Date.now(), type:'buy', status:'ok', name:n, sell: v>0?v:0, cost: v<0?Math.abs(v):0, date: new Date().toLocaleString(), curr: currentCurr});
            refreshUI();
        }

        function moveItem(id, direction) {
            const idx = items.findIndex(i => i.id === id);
            if(direction === 'up' && idx > 0) { [items[idx], items[idx-1]] = [items[idx-1], items[idx]]; }
            if(direction === 'down' && idx < items.length - 1) { [items[idx], items[idx+1]] = [items[idx+1], items[idx]]; }
            refreshUI();
        }

        async function backupToCloud() {
            const pass = prompt(dict[currentLang].p_pass); if(!pass) return;
            const btn = document.getElementById('btn_back'); const origText = btn.innerText; btn.innerText = "...";
            try {
                const settings = { lang: currentLang, curr: currentCurr };
                const res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({action: 'backup', pass: pass, data: items, settings: settings}) });
                const d = await res.json(); alert(d.msg);
            } catch(e) { alert("Chyba spojenia."); }
            btn.innerText = origText;
        }

        async function restoreFromCloud() {
            const pass = prompt(dict[currentLang].p_pass); if(!pass) return;
            const btn = document.getElementById('btn_rest'); const origText = btn.innerText; btn.innerText = "...";
            try {
                const res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({action: 'restore', pass: pass}) });
                const d = await res.json();
                if(d.error) alert(d.error);
                else {
                    items = d.data || [];
                    if(d.settings) {
                        currentLang = d.settings.lang || 'sk'; currentCurr = d.settings.curr || 'EUR';
                        setCurrency(currentCurr, true); setLang(currentLang);
                    }
                    refreshUI(); updateUserDisplay(); alert("Záloha úspešná.");
                }
            } catch(e) { alert("Chyba cloudu."); }
            btn.innerText = origText;
        }

        async function registerUser() {
            const nick = prompt(dict[currentLang].p_nick); if(!nick) return;
            const pass = prompt(dict[currentLang].p_pass); if(!pass) return;
            try {
                const res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({action: 'register', nick: nick, pass: pass}) });
                const d = await res.json(); alert(d.msg);
                if(!d.error) { loggedUserNick = nick; localStorage.setItem('3dee_nick', nick); updateUserDisplay(); }
            } catch(e) { alert("Chyba."); }
        }

        async function fetchUserCount() {
            try { const res = await fetch(CLOUD_URL + "?action=getCount"); const d = await res.json(); totalUsersCount = d.count; updateUserDisplay(); } catch(e) {}
        }

        function refreshUI() {
            localStorage.setItem('3dee_items', JSON.stringify(items));
            const container = document.getElementById('history_list');
            const query = document.getElementById('search_input').value.toLowerCase();
            container.innerHTML = "";
            const sym = currentCurr==='EUR'?'€':(currentCurr==='USD'?'$':'Kč');

            let s_ord=0, s_rev=0, s_prof=0, s_time=0, s_kg=0, s_mat=0, s_ele=0, s_oth=0;
            const exchangeRate = 1; // Pre zjednodušenie

            items.forEach(i => {
                const dCost = i.cost || 0; const dSell = i.sell || 0;
                if(i.status === 'ok') {
                    s_ord++; s_rev += dSell; s_prof += (dSell - dCost);
                    if(i.type === 'print') {
                        s_time += ((i.h||0)*60 + (i.m||0)); s_kg += ((i.w||0)*(i.count||1));
                        s_mat += (i.matCost || 0); s_ele += (i.eleCost || 0);
                    } else { s_oth += dCost; }
                }
                if(!i.name.toLowerCase().includes(query)) return;
                
                const isEditing = editingId === i.id;
                const isCP = i.status === 'cp';
                const count = i.count || 1;
                const card = document.createElement('div');
                card.className = `job-card type-${i.type} ${isEditing ? 'is-editing' : ''} ${isCP ? 'is-cp' : 'is-ok'}`;
                
                card.innerHTML = `
                    <div class="sort-controls">
                        <div class="sort-btn" onclick="moveItem(${i.id}, 'up')">▲</div>
                        <div class="sort-btn" onclick="moveItem(${i.id}, 'down')">▼</div>
                    </div>
                    <div class="job-info">
                        <div class="job-name">${i.name} ${count > 1 ? `<small style="color:var(--primary)">(${count}ks)</small>` : ''}</div>
                        <div class="job-date">${i.date || ''}</div>
                    </div>
                    <div class="job-profit">
                        <div class="profit-val">${dSell.toFixed(2)} ${sym}</div>
                        <div class="cost-val">-${dCost.toFixed(2)} ${sym}</div>
                    </div>
                    <div class="job-data">
                        ${i.type==='print' ? `<span>⏱ <strong>${i.h}h ${i.m}m</strong></span><span>⚖️ <strong>${(i.w*count)}g</strong></span>` : '<span>📦 NÁKUP</span>'}
                    </div>
                    <div class="actions">
                        <button class="action-btn ${isCP?'is-cp-status':'is-ok-status'}" onclick="toggleItemStatus(${i.id})">${isCP?'CP':'OK'}</button>
                        <button class="action-btn" onclick="duplicateItem(${i.id})">❐</button>
                        <button class="action-btn ${isEditing?'is-active-edit':''}" onclick="editItem(${i.id})">✎</button>
                        <button class="action-btn" onclick="deleteItem(${i.id})">🗑</button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('total_kg_ever').innerText = (s_kg/1000).toFixed(2) + " kg";
            document.getElementById('total_time_ever').innerText = Math.floor(s_time/60) + "h " + (s_time%60) + "m";
            document.getElementById('stat_count').innerText = s_ord;
            document.getElementById('stat_obrat').innerText = s_rev.toFixed(2) + " " + sym;
            document.getElementById('total_mat_cost').innerText = s_mat.toFixed(2) + " " + sym;
            document.getElementById('total_ele_cost').innerText = s_ele.toFixed(2) + " " + sym;
            document.getElementById('total_spent_other').innerText = s_oth.toFixed(2) + " " + sym;
            document.getElementById('stat_profit').innerText = s_prof.toFixed(2) + " " + sym;
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('sk-SK');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('live-date').innerHTML = `<span>📅</span> ` + now.toLocaleDateString(currentLang==='en'?'en-US':(currentLang==='cz'?'cs-CZ':'sk-SK'), options);
        }

        function openInfo() { document.getElementById('info_overlay').style.display = 'block'; document.getElementById('info_modal').style.display = 'block'; }
        function closeInfo() { document.getElementById('info_overlay').style.display = 'none'; document.getElementById('info_modal').style.display = 'none'; }
        function setStatus(s) { currentStatus = s; document.getElementById('st_cp').classList.toggle('active', s === 'cp'); document.getElementById('st_ok').classList.toggle('active', s === 'ok'); }
        function updateUserDisplay() { 
            document.getElementById('user_display').innerText = loggedUserNick ? `👤 ${loggedUserNick}` : ""; 
            document.getElementById('total_users_display').innerText = `${dict[currentLang].m_users} ${totalUsersCount}`; 
        }

        ['in_w','in_count','in_h','in_m','in_price_per','cfg_fil','cfg_ele','cfg_watt'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => updatePreview());
        });

        setInterval(updateClock, 1000);
        updateClock();
        applyTexts();
        updatePreview();
        refreshUI();
        fetchUserCount();
    </script>
</body>
</html>
