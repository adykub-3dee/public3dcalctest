<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Dee Pro - Cloud & Business</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #161616; --text: #ffffff;
            --primary: #00a2ff; --accent: #ffcc00; --danger: #ff3e3e; --success: #00ff88;
            --border: #333; --cp-color: #aaa; --input-bg: #000; --input-border: #444;
            --btn-bg: #222; --job-bg: #1a1a1a;
        }
        .light-theme {
            --bg: #f4f5f7; --card: #ffffff; --text: #111111;
            --primary: #0066cc; --accent: #e6b800; --danger: #cc0000; --success: #009944;
            --border: #cccccc; --cp-color: #777777; --input-bg: #ffffff; --input-border: #bbbbbb;
            --btn-bg: #eeeeee; --job-bg: #f9f9f9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 30px; transition: 0.3s; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-left { font-weight: 800; font-size: 1.2em; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .nav-right { display: flex; gap: 8px; }
        .icon-btn { background: var(--btn-bg); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.1em; transition: 0.2s; }
        .icon-btn:hover { background: var(--border); }
        .container { max-width: 600px; margin: 15px auto; padding: 0 10px; }
        .config-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        .config-item { display: flex; flex-direction: column; }
        .config-item label { font-size: 0.75em; color: var(--cp-color); margin-bottom: 3px; }
        .config-item input { background: var(--input-bg); color: var(--text); border: 1px solid var(--input-border); padding: 6px; border-radius: 5px; text-align: center; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85em; margin-bottom: 5px; color: var(--cp-color); }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; background: var(--input-bg); color: var(--text); border: 1px solid var(--input-border); border-radius: 8px; font-size: 1em; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add { background: var(--primary); color: #fff; margin-top: 5px; }
        .btn-add:active { background: #0088cc; transform: scale(0.98); }
        .btn-edit { background: var(--accent); color: #000; margin-top: 5px; display: none; }
        .btn-cancel { background: var(--btn-bg); color: var(--text); border: 1px solid var(--border); margin-top: 5px; display: none; }
        .summary { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--job-bg); border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }
        .sum-val { font-size: 1.5em; font-weight: bold; color: var(--success); }
        .sum-pcs { font-size: 0.85em; color: var(--cp-color); margin-top: 4px; }
        .status-toggle { display: flex; gap: 5px; margin-bottom: 15px; }
        .status-toggle button { flex: 1; padding: 10px; border: 1px solid var(--border); background: var(--btn-bg); color: var(--text); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .status-toggle button.active#st_cp { background: var(--danger); color: #fff; border-color: var(--danger); }
        .status-toggle button.active#st_ok { background: var(--success); color: #000; border-color: var(--success); }
        .job-item { background: var(--job-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: grab; transition: border 0.2s; }
        .job-item.drag-over { border: 2px dashed var(--primary); opacity: 0.7; }
        .job-info { flex: 1; }
        .job-actions { display: flex; gap: 6px; }
        .action-btn { background: var(--btn-bg); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 1em; }
        .btn-status.cp { color: var(--danger); font-weight: bold; border-color: var(--danger); }
        .btn-status.ok { color: var(--success); font-weight: bold; border-color: var(--success); }
        .is-active-edit { border-color: var(--accent); color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: var(--job-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 1.2em; font-weight: bold; margin-top: 5px; }
        .cloud-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .cloud-btn { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
        .btn-backup { background: #6c5ce7; color: white; }
        .btn-restore { background: #00b894; color: white; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); z-index: 1000; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal h3 { margin-bottom: 15px; }
        .modal input { margin-bottom: 10px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        .info-content { font-size: 0.9em; line-height: 1.5; color: var(--cp-color); margin-bottom: 20px; }
        .info-content p { margin-bottom: 10px; }
        .user-info { text-align: center; margin-bottom: 15px; font-size: 0.9em; color: var(--accent); font-weight: bold; }
        .users-count { font-size: 0.8em; color: var(--cp-color); text-align: center; margin-top: -10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="nav-bar">
    <div class="nav-left">
        <span id="nav_title">3Dee Pro</span>
    </div>
    <div class="nav-right">
        <button class="icon-btn" onclick="openInfo()">ℹ️</button>
        <button class="icon-btn" onclick="toggleCurrency()" id="btn_curr">€</button>
        <button class="icon-btn" onclick="toggleLang()" id="btn_lang">SK</button>
        <button class="icon-btn" onclick="toggleTheme()" id="btn_theme">🌙</button>
    </div>
</div>
<div class="container">
    <div class="user-info" id="user_display"></div>
    <div class="users-count" id="total_users_display"></div>

    <div class="cloud-section">
        <button class="cloud-btn btn-backup" onclick="openCloudModal('backup')" id="m_btn_backup">☁️ ZÁLOHOVAŤ</button>
        <button class="cloud-btn btn-restore" onclick="openCloudModal('restore')" id="m_btn_restore">🔄 OBNOVIŤ</button>
    </div>

    <div class="config-bar">
        <div class="config-item">
            <label id="lbl_cfg_fil">Filament (/kg)</label>
            <input type="number" id="cfg_fil" value="15" step="0.1">
        </div>
        <div class="config-item">
            <label id="lbl_cfg_ele">Elektrina (/kWh)</label>
            <input type="number" id="cfg_ele" value="0.20" step="0.01">
        </div>
        <div class="config-item">
            <label id="lbl_cfg_watt">Spotreba (W)</label>
            <input type="number" id="cfg_watt" value="120" step="10">
        </div>
    </div>

    <div class="card">
        <div class="status-toggle">
            <button id="st_cp" class="active" onclick="setStatus('cp')">Cenová Ponuka</button>
            <button id="st_ok" onclick="setStatus('ok')">Hotovo (OK)</button>
        </div>
        
        <div class="input-group">
            <label id="lbl_name">Názov zákazky</label>
            <input type="text" id="in_name" placeholder="...">
        </div>

        <div class="row-2">
            <div class="input-group">
                <label id="lbl_w">Váha (gramy)</label>
                <input type="number" id="in_w" value="0">
            </div>
            <div class="input-group">
                <label id="lbl_count">Počet kusov</label>
                <input type="number" id="in_count" value="1">
            </div>
        </div>

        <div class="row-2">
            <div class="input-group">
                <label id="lbl_h">Čas (Hodiny)</label>
                <input type="number" id="in_h" value="0">
            </div>
            <div class="input-group">
                <label id="lbl_m">Čas (Minúty)</label>
                <input type="number" id="in_m" value="0">
            </div>
        </div>

        <div class="input-group">
            <label id="lbl_price_per">Moja cena za 1 ks (Voliteľné)</label>
            <input type="number" id="in_price_per" value="" step="0.1" placeholder="Auto výpočet...">
        </div>

        <div class="summary">
            <div>
                <div style="font-size: 0.9em; color: var(--cp-color);" id="lbl_sum">Spolu za zákazku:</div>
                <div class="sum-pcs" id="sum_pcs_display">0.00 / ks</div>
            </div>
            <div class="sum-val" id="sum_val">0.00 €</div>
        </div>

        <button class="btn btn-add" id="btn_action" onclick="saveItem()">+ PRIDAŤ POLOŽKU</button>
        <button class="btn btn-edit" id="btn_save_edit" onclick="saveEdit()">ULOŽIŤ ZMENY</button>
        <button class="btn btn-cancel" id="btn_cancel_edit" onclick="cancelEdit()">ZRUŠIŤ</button>
    </div>

    <h3 style="margin: 20px 0 10px 5px; font-size: 1.1em;" id="lbl_list">Zoznam zákaziek</h3>
    <div id="job_list"></div>

    <div class="card" style="margin-top:20px;">
        <h3 style="margin-bottom:15px; text-align:center;" id="lbl_stats">Celkové Štatistiky</h3>
        <div class="stats-grid">
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_w">Spotrebovaný plast</div>
                <div class="stat-val" id="total_kg_ever">0.00 kg</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_time">Čas tlače</div>
                <div class="stat-val" id="total_time_ever">0h 0m</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_orders">Počet zákaziek</div>
                <div class="stat-val" id="stat_count">0</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_obrat">Celkový Obrat</div>
                <div class="stat-val" style="color:var(--primary);" id="stat_obrat">0.00 €</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_mat">Náklad materiál</div>
                <div class="stat-val" style="color:var(--danger);" id="total_mat_cost">0.00 €</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_ele">Náklad elektrina</div>
                <div class="stat-val" style="color:var(--danger);" id="total_ele_cost">0.00 €</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_oth">Ostatné náklady</div>
                <div class="stat-val" style="color:var(--danger);" id="total_spent_other">0.00 €</div>
            </div>
            <div class="stat-box">
                <div style="font-size:0.8em;color:var(--cp-color);" id="st_lbl_prof">Čistý Zisk</div>
                <div class="stat-val" style="color:var(--success);" id="stat_profit">0.00 €</div>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="cloud_overlay" onclick="closeCloudModal()"></div>
<div class="modal" id="cloud_modal">
    <h3 id="cloud_title">Cloud</h3>
    <input type="text" id="cloud_nick" placeholder="Nick (meno)">
    <input type="password" id="cloud_pass" placeholder="Heslo">
    <button class="btn btn-add" id="cloud_action_btn" onclick="executeCloud()">Potvrdiť</button>
    <div style="text-align:center; margin-top:10px; font-size:0.85em;">
        <a href="#" onclick="registerUser()" style="color:var(--primary);" id="cloud_reg_link">Nemám účet - Vytvoriť</a>
    </div>
</div>

<div class="overlay" id="info_overlay" onclick="closeInfo()"></div>
<div class="modal" id="info_modal">
    <h3 id="info_title">Informácie</h3>
    <div class="info-content" id="info_content">
        </div>
    <button class="btn btn-cancel" style="display:block; width:100%;" onclick="closeInfo()" id="info_close_btn">Zavrieť</button>
</div>
<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbye3X-D72Q4e2Jc1o4a_P5vK1q0_E98A53-D/exec"; // VLOŽ SVOJU URL

    const dict = {
        sk: {
            title: "3Dee Pro", lbl_cfg_fil: "Filament (/kg)", lbl_cfg_ele: "Elektrina (/kWh)", lbl_cfg_watt: "Spotreba (W)",
            lbl_name: "Názov zákazky", lbl_w: "Váha (gramy)", lbl_count: "Počet kusov", lbl_h: "Čas (Hodiny)", lbl_m: "Čas (Minúty)",
            lbl_price_per: "Moja cena za 1 ks (Voliteľné)", lbl_sum: "Spolu za zákazku:", btn_add: "+ PRIDAŤ POLOŽKU",
            btn_edit: "ULOŽIŤ ZMENY", btn_cancel: "ZRUŠIŤ", lbl_list: "Zoznam zákaziek", lbl_stats: "Celkové Štatistiky",
            st_cp: "Cenová Ponuka", st_ok: "Hotovo (OK)", st_lbl_w: "Spotrebovaný plast", st_lbl_time: "Čas tlače",
            st_lbl_orders: "Počet zákaziek", st_lbl_obrat: "Celkový Obrat", st_lbl_mat: "Náklad materiál",
            st_lbl_ele: "Náklad elektrina", st_lbl_oth: "Ostatné náklady", st_lbl_prof: "Čistý Zisk",
            m_users: "Celkom užívateľov v sieti:", m_btn_backup: "☁️ ZÁLOHOVAŤ", m_btn_restore: "🔄 OBNOVIŤ",
            m_cloud: "Cloud Akcia", m_reg: "Nemám účet - Vytvoriť", m_pcs: "ks",
            info_title: "Informácie", info_close: "Zavrieť",
            info_text: `
                <p>Hobby nástroj na prepočítavanie 3D tlače a ukladanie zákaziek.</p>
                <p>Pre dlhodobé ukladanie zákaziek je potrebné si vytvoriť Nick a Heslo.</p>
                <p>Keď máte vytvorené svoje konto, následne sa prihlasujete len cez vaše heslo tlačidlom <b>OBNOVIŤ</b> (odporúčame zvoliť komplexnejšie heslo).</p>
                <p>Keď máte nahodené svoje položky, treba stlačiť <b>ZÁLOHOVAŤ</b>, aby sa zapísali do cloudu pod vaším účtom.</p>
                <p>Refresh stránky vás vráti do anonymného režimu (bez účtu).</p>
                <p>Návrat do účtu je opäť možný cez tlačidlo <b>OBNOVIŤ</b> a vaše heslo.</p>
                <p>Instagram: <a href="https://instagram.com/3dee.tlac" target="_blank" style="color:var(--primary); font-weight:bold;">3dee.tlac</a></p>
            `
        },
        cs: {
            title: "3Dee Pro", lbl_cfg_fil: "Filament (/kg)", lbl_cfg_ele: "Elektřina (/kWh)", lbl_cfg_watt: "Spotřeba (W)",
            lbl_name: "Název zakázky", lbl_w: "Váha (gramy)", lbl_count: "Počet kusů", lbl_h: "Čas (Hodiny)", lbl_m: "Čas (Minuty)",
            lbl_price_per: "Moje cena za 1 ks (Volitelné)", lbl_sum: "Celkem za zakázku:", btn_add: "+ PŘIDAT POLOŽKU",
            btn_edit: "ULOŽIT ZMĚNY", btn_cancel: "ZRUŠIT", lbl_list: "Seznam zakázek", lbl_stats: "Celkové Statistiky",
            st_cp: "Cenová Nabídka", st_ok: "Hotovo (OK)", st_lbl_w: "Spotřebovaný plast", st_lbl_time: "Čas tisku",
            st_lbl_orders: "Počet zakázek", st_lbl_obrat: "Celkový Obrat", st_lbl_mat: "Náklad materiál",
            st_lbl_ele: "Náklad elektřina", st_lbl_oth: "Ostatní náklady", st_lbl_prof: "Čistý Zisk",
            m_users: "Celkem uživatelů v síti:", m_btn_backup: "☁️ ZÁLOHOVAT", m_btn_restore: "🔄 OBNOVIT",
            m_cloud: "Cloud Akce", m_reg: "Nemám účet - Vytvořit", m_pcs: "ks",
            info_title: "Informace", info_close: "Zavřít",
            info_text: `
                <p>Hobby nástroj pro přepočítávání 3D tisku a ukládání zakázek.</p>
                <p>Pro dlouhodobé ukládání zakázek je nutné si vytvořit Nick a Heslo.</p>
                <p>Když máte vytvořené své konto, následně se přihlašujete pouze přes vaše heslo tlačítkem <b>OBNOVIT</b> (doporučujeme zvolit komplexnější heslo).</p>
                <p>Když máte nahozené své položky, je třeba stisknout <b>ZÁLOHOVAT</b>, aby se zapsaly do cloudu pod vaším účtem.</p>
                <p>Refresh stránky vás vrátí do anonymního režimu (bez účtu).</p>
                <p>Návrat do účtu je opět možný přes tlačítko <b>OBNOVIT</b> a vaše heslo.</p>
                <p>Instagram: <a href="https://instagram.com/3dee.tlac" target="_blank" style="color:var(--primary); font-weight:bold;">3dee.tlac</a></p>
            `
        },
        en: {
            title: "3Dee Pro", lbl_cfg_fil: "Filament (/kg)", lbl_cfg_ele: "Electricity (/kWh)", lbl_cfg_watt: "Power (W)",
            lbl_name: "Job Name", lbl_w: "Weight (grams)", lbl_count: "Pieces", lbl_h: "Time (Hours)", lbl_m: "Time (Minutes)",
            lbl_price_per: "My price per piece (Optional)", lbl_sum: "Total for Job:", btn_add: "+ ADD ITEM",
            btn_edit: "SAVE CHANGES", btn_cancel: "CANCEL", lbl_list: "Job List", lbl_stats: "Total Statistics",
            st_cp: "Quotation", st_ok: "Done (OK)", st_lbl_w: "Consumed Plastic", st_lbl_time: "Print Time",
            st_lbl_orders: "Total Orders", st_lbl_obrat: "Total Revenue", st_lbl_mat: "Material Cost",
            st_lbl_ele: "Electricity Cost", st_lbl_oth: "Other Costs", st_lbl_prof: "Net Profit",
            m_users: "Total users in network:", m_btn_backup: "☁️ BACKUP", m_btn_restore: "🔄 RESTORE",
            m_cloud: "Cloud Action", m_reg: "No account - Create one", m_pcs: "pcs",
            info_title: "Information", info_close: "Close",
            info_text: `
                <p>A hobby tool for calculating 3D printing costs and saving orders.</p>
                <p>For long-term saving of orders, you need to create a Nickname and Password.</p>
                <p>Once your account is created, you log in using only your password via the <b>RESTORE</b> button (we recommend a complex password).</p>
                <p>When you have added your items, press <b>BACKUP</b> to save them to the cloud under your account.</p>
                <p>Refreshing the page returns you to anonymous mode (without an account).</p>
                <p>Returning to your account is possible again via the <b>RESTORE</b> button and your password.</p>
                <p>Instagram: <a href="https://instagram.com/3dee.tlac" target="_blank" style="color:var(--primary); font-weight:bold;">3dee.tlac</a></p>
            `
        }
    };

    let items = [];
    let currentStatus = 'cp';
    let editingId = null;
    let draggedId = null;

    let currentTheme = localStorage.getItem('theme') || 'dark';
    let currentLang = localStorage.getItem('lang') || 'sk';
    let currentCurr = localStorage.getItem('curr') || 'EUR';

    let cloudActionType = '';
    let loggedUserNick = "";
    let totalUsersCount = 0;
    function applyTheme() {
        if (currentTheme === 'light') { document.body.classList.add('light-theme'); document.getElementById('btn_theme').innerText = '☀️'; } 
        else { document.body.classList.remove('light-theme'); document.getElementById('btn_theme').innerText = '🌙'; }
        localStorage.setItem('theme', currentTheme);
    }
    function toggleTheme() { currentTheme = currentTheme === 'dark' ? 'light' : 'dark'; applyTheme(); }

    function setCurrency(c, noRefresh=false) {
        currentCurr = c; localStorage.setItem('curr', c);
        document.getElementById('btn_curr').innerText = c === 'EUR' ? '€' : 'Kč';
        if(!noRefresh) refreshUI();
    }
    function toggleCurrency() { setCurrency(currentCurr === 'EUR' ? 'CZK' : 'EUR'); }

    function setLang(l) {
        currentLang = l; localStorage.setItem('lang', l);
        document.getElementById('btn_lang').innerText = l.toUpperCase();
        const d = dict[l];
        for(let key in d) {
            let el = document.getElementById(key);
            if(el) { if(el.tagName === 'INPUT') el.placeholder = d[key]; else el.innerHTML = d[key]; }
        }
        updateUserDisplay();
        refreshUI();
    }
    function toggleLang() { const langs = ['sk', 'cs', 'en']; setLang(langs[(langs.indexOf(currentLang) + 1) % 3]); }

    function calcItem(w, count, h, m, override_per) {
        let fil_p = parseFloat(document.getElementById('cfg_fil').value) || 0;
        let ele_p = parseFloat(document.getElementById('cfg_ele').value) || 0;
        let watt = parseFloat(document.getElementById('cfg_watt').value) || 120;
        
        if (currentCurr === 'CZK') { fil_p /= 25; ele_p /= 25; }
        
        const matC = (w / 1000) * fil_p;
        const totalMins = (h * 60) + m;
        const eleC = (totalMins / 60) * (watt / 1000) * ele_p;
        const baseCost = (matC + eleC) * count;

        let finalPer = override_per > 0 ? override_per : ((matC + eleC) * 2.5); // 2.5 nasobok ako zaklad
        if (currentCurr === 'CZK' && override_per > 0) finalPer /= 25;

        return {
            matCost: matC * count, eleCost: eleC * count, 
            finalTotal: finalPer * count, finalPer: finalPer
        };
    }

    function updatePreview() {
        let w = parseFloat(document.getElementById('in_w').value) || 0;
        let count = parseInt(document.getElementById('in_count').value) || 1;
        let h = parseInt(document.getElementById('in_h').value) || 0;
        let m = parseInt(document.getElementById('in_m').value) || 0;
        let override = parseFloat(document.getElementById('in_price_per').value) || 0;

        let res = calcItem(w, count, h, m, override);
        let sym = currentCurr === 'EUR' ? '€' : 'Kč';
        let mult = currentCurr === 'EUR' ? 1 : 25;

        document.getElementById('sum_val').innerText = (res.finalTotal * mult).toFixed(2) + " " + sym;
        document.getElementById('sum_pcs_display').innerText = (res.finalPer * mult).toFixed(2) + " " + sym + " / " + dict[currentLang].m_pcs;
    }

    function saveItem() {
        let n = document.getElementById('in_name').value || dict[currentLang].lbl_name;
        let w = parseFloat(document.getElementById('in_w').value) || 0;
        let c = parseInt(document.getElementById('in_count').value) || 1;
        let h = parseInt(document.getElementById('in_h').value) || 0;
        let m = parseInt(document.getElementById('in_m').value) || 0;
        let pr = parseFloat(document.getElementById('in_price_per').value) || 0;

        let obj = { id: Date.now(), status: currentStatus, name: n, w: w, count: c, h: h, m: m, override_per: pr };
        items.unshift(obj);
        
        document.getElementById('in_name').value = ''; document.getElementById('in_price_per').value = '';
        refreshUI();
    }

    function editItem(id) {
        let item = items.find(i => i.id === id); if(!item) return;
        editingId = id;
        document.getElementById('in_name').value = item.name;
        document.getElementById('in_w').value = item.w;
        document.getElementById('in_count').value = item.count;
        document.getElementById('in_h').value = item.h;
        document.getElementById('in_m').value = item.m;
        document.getElementById('in_price_per').value = item.override_per || "";
        setStatus(item.status);
        
        document.getElementById('btn_action').style.display = 'none';
        document.getElementById('btn_save_edit').style.display = 'block';
        document.getElementById('btn_cancel_edit').style.display = 'block';
        updatePreview();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        refreshUI();
    }

    function saveEdit() {
        let item = items.find(i => i.id === editingId); if(!item) return;
        item.name = document.getElementById('in_name').value;
        item.w = parseFloat(document.getElementById('in_w').value) || 0;
        item.count = parseInt(document.getElementById('in_count').value) || 1;
        item.h = parseInt(document.getElementById('in_h').value) || 0;
        item.m = parseInt(document.getElementById('in_m').value) || 0;
        item.override_per = parseFloat(document.getElementById('in_price_per').value) || 0;
        item.status = currentStatus;
        cancelEdit();
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('in_name').value = ''; document.getElementById('in_price_per').value = '';
        document.getElementById('btn_action').style.display = 'block';
        document.getElementById('btn_save_edit').style.display = 'none';
        document.getElementById('btn_cancel_edit').style.display = 'none';
        refreshUI();
    }

    function deleteItem(id) { if(confirm("Vymazať položku?")) { items = items.filter(i => i.id !== id); refreshUI(); } }
    
    function duplicateItem(id) {
        let item = items.find(i => i.id === id); if(!item) return;
        let copy = JSON.parse(JSON.stringify(item));
        copy.id = Date.now(); copy.name = copy.name + " (Kópia)";
        items.unshift(copy); refreshUI();
    }

    function toggleItemStatus(id) {
        let item = items.find(i => i.id === id); if(!item) return;
        item.status = item.status === 'cp' ? 'ok' : 'cp'; refreshUI();
    }

    // DRAG AND DROP
    function dragStart(e, id) { draggedId = id; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => e.target.style.opacity = '0.5', 0); }
    function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; let target = e.target.closest('.job-item'); if(target) target.classList.add('drag-over'); }
    function dragLeave(e) { let target = e.target.closest('.job-item'); if(target) target.classList.remove('drag-over'); }
    function drop(e, targetId) {
        e.preventDefault(); let target = e.target.closest('.job-item'); if(target) target.classList.remove('drag-over');
        if(draggedId === targetId) return;
        let draggedIndex = items.findIndex(i => i.id === draggedId);
        let targetIndex = items.findIndex(i => i.id === targetId);
        let movedItem = items.splice(draggedIndex, 1)[0];
        items.splice(targetIndex, 0, movedItem);
        refreshUI();
    }
    function dragEnd(e) { e.target.style.opacity = '1'; draggedId = null; }

    function refreshUI() {
        let container = document.getElementById('job_list'); container.innerHTML = '';
        let sym = currentCurr === 'EUR' ? '€' : 'Kč'; let mult = currentCurr === 'EUR' ? 1 : 25;

        let s_kg=0, s_time=0, s_ord=0, s_rev=0, s_mat=0, s_ele=0, s_oth=0, s_prof=0;

        items.forEach(i => {
            let res = calcItem(i.w, i.count, i.h, i.m, i.override_per);
            if (i.status === 'ok') {
                s_kg += i.w * i.count; s_time += ((i.h*60)+i.m)*i.count; s_ord += i.count;
                s_rev += (res.finalTotal * mult); s_mat += (res.matCost * mult); s_ele += (res.eleCost * mult);
                s_prof += ((res.finalTotal - res.matCost - res.eleCost) * mult);
            }
            
            let isCP = i.status === 'cp';
            let isEditing = editingId === i.id;
            let w_text = (i.w * i.count) + "g";
            let t_text = Math.floor(((i.h*60)+i.m)*i.count/60) + "h " + (((i.h*60)+i.m)*i.count%60) + "m";
            
            // Text pocet kusov (napr. 3 ks)
            let pcsText = `${i.count} ${dict[currentLang].m_pcs}`;

            let card = document.createElement('div');
            card.className = 'job-item';
            card.draggable = true;
            card.ondragstart = (e) => dragStart(e, i.id); card.ondragover = dragOver; card.ondragleave = dragLeave;
            card.ondrop = (e) => drop(e, i.id); card.ondragend = dragEnd;

            card.innerHTML = `
                <div class="job-info" style="opacity: ${isCP ? '0.6' : '1'};">
                    <div style="font-weight:bold;font-size:1.1em;margin-bottom:5px;word-break:break-all;">
                        ${i.name} <span style="font-size:0.8em; color:var(--primary);">(${pcsText})</span>
                    </div>
                    <div style="font-size:0.85em;color:var(--cp-color);margin-bottom:5px;">${w_text} | ${t_text}</div>
                    <div style="color:${isCP ? 'var(--cp-color)' : 'var(--success)'}; font-weight:bold; font-size:1.1em;">
                        ${(res.finalTotal * mult).toFixed(2)} ${sym} 
                        <span style="font-size:0.7em;font-weight:normal;color:var(--cp-color);">(${(res.finalPer * mult).toFixed(2)} ${sym}/${dict[currentLang].m_pcs})</span>
                    </div>
                </div>
                <div class="job-actions">
                    <button class="action-btn btn-status ${isCP ? 'cp' : 'ok'}" onclick="toggleItemStatus(${i.id})">${isCP?'CP':'OK'}</button>
                    <button class="action-btn" onclick="duplicateItem(${i.id})">❐</button>
                    <button class="action-btn ${isEditing ? 'is-active-edit' : ''}" onclick="editItem(${i.id})">✎</button>
                    <button class="action-btn" onclick="deleteItem(${i.id})">🗑</button>
                </div>
            `;
            container.appendChild(card);
        });

        document.getElementById('total_kg_ever').innerText = (s_kg/1000).toFixed(2) + " kg";
        document.getElementById('total_time_ever').innerText = Math.floor(s_time/60) + "h " + (s_time%60) + "m";
        document.getElementById('stat_count').innerText = s_ord;
        document.getElementById('stat_obrat').innerText = s_rev.toFixed(2) + " " + sym;
        document.getElementById('total_mat_cost').innerText = s_mat.toFixed(2) + " " + sym;
        document.getElementById('total_ele_cost').innerText = s_ele.toFixed(2) + " " + sym;
        document.getElementById('total_spent_other').innerText = s_oth.toFixed(2) + " " + sym;
        document.getElementById('stat_profit').innerText = s_prof.toFixed(2) + " " + sym;
        
        updatePreview();
    }

    ['in_w','in_count','in_h','in_m','in_price_per','cfg_fil','cfg_ele','cfg_watt'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => updatePreview());
    });

    function openCloudModal(type) { 
        cloudActionType = type; 
        document.getElementById('cloud_title').innerText = type === 'backup' ? dict[currentLang].m_btn_backup : dict[currentLang].m_btn_restore;
        document.getElementById('cloud_overlay').style.display = 'block'; 
        document.getElementById('cloud_modal').style.display = 'block'; 
    }
    function closeCloudModal() { document.getElementById('cloud_overlay').style.display = 'none'; document.getElementById('cloud_modal').style.display = 'none'; }
    
    function getSettings() {
        return {
            fil: document.getElementById('cfg_fil').value, ele: document.getElementById('cfg_ele').value,
            watt: document.getElementById('cfg_watt').value, lang: currentLang, curr: currentCurr
        };
    }

    async function registerUser() {
        let nick = document.getElementById('cloud_nick').value.trim();
        let pass = document.getElementById('cloud_pass').value.trim();
        if(!nick || !pass) return alert("Zadaj Nick aj Heslo pre registráciu.");
        try {
            let res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({ action: "register", nick: nick, pass: pass }) });
            let d = await res.json(); alert(d.message);
        } catch(e) { alert("Chyba spojenia s Cloudom."); }
    }

    async function executeCloud() {
        let nick = document.getElementById('cloud_nick').value.trim();
        let pass = document.getElementById('cloud_pass').value.trim();
        if(!pass) return alert("Zadaj heslo!");
        let btn = document.getElementById('cloud_action_btn'); let origText = btn.innerText; btn.innerText = "...";
        
        try {
            if (cloudActionType === 'backup') {
                let res = await fetch(CLOUD_URL, { method: 'POST', body: JSON.stringify({ action: "backup", pass: pass, data: items, settings: getSettings() }) });
                let d = await res.json(); alert(d.message); closeCloudModal();
            } else {
                let res = await fetch(`${CLOUD_URL}?action=restore&pass=${pass}`);
                let d = await res.json();
                if(d.error) alert(d.message);
                else {
                    items = d.data; loggedUserNick = d.nick; totalUsersCount = d.userCount; closeCloudModal();
                    if(d.settings) {
                        if(d.settings.fil) document.getElementById('cfg_fil').value = d.settings.fil;
                        if(d.settings.ele) document.getElementById('cfg_ele').value = d.settings.ele;
                        if(d.settings.watt) document.getElementById('cfg_watt').value = d.settings.watt;
                        currentLang = d.settings.lang || 'sk'; currentCurr = d.settings.curr || 'EUR';
                        setCurrency(currentCurr, true); setLang(currentLang);
                    }
                    refreshUI(); updateUserDisplay(); alert("Záloha a nastavenia boli úspešne obnovené.");
                }
            }
        } catch(e) { alert("Chyba spojenia s Cloudom."); }
        btn.innerText = origText;
    }

    function openInfo() { document.getElementById('info_overlay').style.display = 'block'; document.getElementById('info_modal').style.display = 'block'; }
    function closeInfo() { document.getElementById('info_overlay').style.display = 'none'; document.getElementById('info_modal').style.display = 'none'; }
    function setStatus(s) { currentStatus = s; document.getElementById('st_cp').classList.toggle('active', s === 'cp'); document.getElementById('st_ok').classList.toggle('active', s === 'ok'); }
    function updateUserDisplay() { document.getElementById('user_display').innerText = loggedUserNick ? `👤 ${loggedUserNick}` : ""; document.getElementById('total_users_display').innerText = `${dict[currentLang].m_users} ${totalUsersCount}`; }

    applyTheme(); setLang(currentLang); setCurrency(currentCurr);
</script>
</body>
</html>
